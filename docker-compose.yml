version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scentscape-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-scentscape}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scentscape_password}
      POSTGRES_DB: ${DB_NAME:-scentscape}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scentscape}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scentscape

  neo4j:
    image: neo4j:5-community
    container_name: scentscape-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scentscape

  redis:
    image: redis:7-alpine
    container_name: scentscape-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scentscape

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scentscape-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+asyncpg://${DB_USER:-scentscape}:${DB_PASSWORD:-scentscape_password}@postgres:5432/${DB_NAME:-scentscape}}
      NEO4J_URI: ${DOCKER_NEO4J_URI:-neo4j://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SCENTSCAPE_REPO_ROOT: ${SCENTSCAPE_REPO_ROOT:-/app}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml/data:/app/ml/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scentscape
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scentscape-worker
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+asyncpg://${DB_USER:-scentscape}:${DB_PASSWORD:-scentscape_password}@postgres:5432/${DB_NAME:-scentscape}}
      NEO4J_URI: ${DOCKER_NEO4J_URI:-neo4j://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SCENTSCAPE_REPO_ROOT: ${SCENTSCAPE_REPO_ROOT:-/app}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml/data:/app/ml/data:ro
    healthcheck:
      disable: true
    networks:
      - scentscape
    command: celery -A app.celery_app:celery_app worker --loglevel=info --queues recommendations,ml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scentscape-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    networks:
      - scentscape
    command: npm start -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  scentscape:
    driver: bridge
