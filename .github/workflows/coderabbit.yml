name: CodeRabbit Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
jobs:
  coderabbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CodeRabbit Review
        uses: coderabbitai/coderabbit-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # No API key needed for public repos; for private repos,
          # add CODERABBIT_API_KEY to GitHub repo secrets.
          # Get free key at: https://coderabbit.ai
