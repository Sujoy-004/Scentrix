[build]
builder = "dockerfile"
dockerfile = "./Dockerfile"

[deploy]
startCommand = "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckUrl = "/health"
healthcheckInterval = 10
healthcheckTimeout = 5

[env]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
PIP_NO_CACHE_DIR = "1"
